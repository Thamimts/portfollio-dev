<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Project</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      // Simple client-side detail loader
      async function loadProject() {
        const params = new URLSearchParams(location.search);
        const id = Number(params.get('id')) || null;
        const container = document.getElementById('project-root');
        if (!id) {
          container.innerHTML = '<p>Invalid project id.</p>';
          return;
        }

        try {
          const res = await fetch('/api/projects');
          const projects = await res.json();
          const p = projects.find((x) => Number(x.id) === id);
          if (!p) {
            container.innerHTML = '<p>Project not found.</p>';
            return;
          }

          container.innerHTML = `
            <article class="project-detail">
              <a class="back-link" href="/">← Back to portfolio</a>
              <h1>${p.title}</h1>
              <p class="lead">${p.description}</p>
              <ul class="project-stack">${(p.stack || []).map(s => `<li>${s}</li>`).join('')}</ul>
              <p><strong>Role:</strong> Developer</p>
              <p><strong>Duration:</strong> —</p>
              <p><strong>Highlights:</strong></p>
              <ul>
                <li>Clean UI & responsive layout</li>
                <li>JS-driven interactivity</li>
              </ul>
            </article>
          `;
        } catch (err) {
          container.innerHTML = `<p>Error loading project: ${err.message}</p>`;
        }
      }

      document.addEventListener('DOMContentLoaded', loadProject);
    </script>
  </head>
  <body>
    <main id="project-root" class="content"></main>
  </body>
</html>
